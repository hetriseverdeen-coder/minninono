<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💿 minninono Y2K Cabinet</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
/* Body & Background */
body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  min-height:100vh;
  padding:30px;
  background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
  background-size: cover;
}

/* Title with jeans texture */
h1{
  font-family:'Orbitron',sans-serif;
  font-size:3em;
  text-align:center;
  color:#1e3a5f;
  background: url('https://i.ibb.co/0GZ2Sbk/jeans-texture.jpg') repeat;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 10px #fff, 0 0 20px #b0c4de;
  margin-bottom:40px;
}

/* Container */
.container{
  max-width:1100px;
  margin:auto;
}

/* Buttons & Inputs */
button{
  background:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 0 10px rgba(255,255,255,0.7);
  transition:0.3s;
}
button:hover{transform: scale(1.05);}

input{
  padding:8px;
  border-radius:15px;
  border:none;
  margin:5px 0;
  width:100%;
}

/* Folder Grid */
.folder-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:20px;
  margin-top:30px;
}

/* Folder 2D sticker style */
.folder{
  background:transparent;
  text-align:center;
  transition:0.3s;
  position:relative;
  cursor:pointer;
}
.folder:hover{transform:scale(1.1);}
.folder img{
  width:100px;
  height:100px;
  object-fit:contain;
}

/* Folder name */
.folder h4{
  font-family:'Orbitron',sans-serif;
  color:white;
  text-shadow:0 0 5px #000;
  margin-top:5px;
  cursor:text;
}

/* Links / Product cards */
.link-card{
  background:rgba(255,255,255,0.85);
  border-radius:20px;
  padding:15px;
  margin:10px 0;
  display:flex;
  align-items:center;
  gap:15px;
  box-shadow:0 0 15px rgba(255,255,255,0.8);
  transition:0.3s;
}
.link-card img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:15px;
}
.link-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #fff;
}

.hidden{display:none;}
.back-btn{margin-top:20px;}
</style>
</head>
<body>

<div class="container">
<h1>💿 minninono Y2K Cabinet</h1>

<!-- Folder Section -->
<div id="folderSection">
<button onclick="addFolder()">+ Add Folder</button>
<div class="folder-grid" id="folders"></div>
</div>

<!-- Link Section -->
<div id="linkSection" class="hidden">
<button class="back-btn" onclick="backToFolders()">⬅ Back</button>
<h2 id="folderTitle"></h2>

<input type="text" id="productName" placeholder="Product Name">
<input type="text" id="productLink" placeholder="Affiliate Link">
<input type="text" id="productImage" placeholder="Product Image URL">
<button onclick="addLink()">Add Product</button>

<div id="links"></div>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('y2kCabinet')) || {folders:[]};
let currentFolderIndex = null;

function saveData(){
  localStorage.setItem('y2kCabinet',JSON.stringify(data));
}

function renderFolders(){
  const folderContainer=document.getElementById('folders');
  folderContainer.innerHTML='';
  data.folders.forEach((folder,index)=>{
    const div=document.createElement('div');
    div.className='folder';
    div.innerHTML=`
      <img src="${folder.image || 'https://via.placeholder.com/100'}">
      <h4 contenteditable="true" onblur="renameFolder(${index},this.innerText)">${folder.name}</h4>
      <button onclick="openFolder(${index})">Open</button>
    `;
    folderContainer.appendChild(div);
  });
}

function addFolder(){
  const name=prompt('Folder Name:');
  const image=prompt('Sticker/Image URL:');
  if(!name) return;
  data.folders.push({name,image,links:[]});
  saveData();
  renderFolders();
}

function renameFolder(index,newName){
  data.folders[index].name=newName;
  saveData();
}

function openFolder(index){
  currentFolderIndex=index;
  document.getElementById('folderSection').classList.add('hidden');
  document.getElementById('linkSection').classList.remove('hidden');
  document.getElementById('folderTitle').innerText=data.folders[index].name;
  renderLinks();
}

function backToFolders(){
  document.getElementById('folderSection').classList.remove('hidden');
  document.getElementById('linkSection').classList.add('hidden');
}

function addLink(){
  const name=document.getElementById('productName').value;
  const link=document.getElementById('productLink').value;
  const image=document.getElementById('productImage').value;
  if(!name||!link) return;
  data.folders[currentFolderIndex].links.push({name,link,image});
  saveData();
  renderLinks();
  document.getElementById('productName').value='';
  document.getElementById('productLink').value='';
  document.getElementById('productImage').value='';
}

function renderLinks(){
  const container=document.getElementById('links');
  container.innerHTML='';
  data.folders[currentFolderIndex].links.forEach(item=>{
    const div=document.createElement('div');
    div.className='link-card';
    div.innerHTML=`
      <img src="${item.image || 'https://via.placeholder.com/70'}">
      <div>
        <strong>${item.name}</strong><br>
        <a href="${item.link}" target="_blank">Open Link</a>
      </div>
    `;
    container.appendChild(div);
  });
}

renderFolders();
</script>

</body>
</html>
